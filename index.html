<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdfcf0;
            color: #333;
            overflow-x: hidden;
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            text-align: center;
            transition: all 1s ease;
        }

        .gift-box {
            font-size: 100px;
            cursor: pointer;
            animation: bounce 2s infinite;
        }

        .reveal-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-top: 20px;
        }

        /* MAIN CONTENT (Hidden initially) */
        #main-content {
            display: none;
            opacity: 0;
            padding: 50px 20px;
        }

        .section {
            max-width: 800px;
            margin: 0 auto 50px auto;
            text-align: center;
        }

        h2 {
            font-size: 2.5rem;
            color: #ff6b6b;
            margin-bottom: 30px;
        }

        /* PHOTO GRIDS */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .photo-grid img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .photo-grid img:hover {
            transform: scale(1.05);
        }

        /* VIDEO SECTION */
        video {
            width: 100%;
            max-width: 600px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 50px;
            background: #333;
            color: white;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-30px);}
            60% {transform: translateY(-15px);}
        }
    </style>
</head>
<body>

    <!-- THE COVER PAGE -->
    <div class="hero" id="hero">
        <h1 style="font-size: 3rem; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.2);">Happy Birthday!</h1>
        <div class="gift-box" onclick="openGift()">🎁</div>
        <p style="color: white; font-size: 1.2rem;">May 21st Special</p>
        <button class="reveal-btn" onclick="openGift()">Open Gift</button>
    </div>

    <!-- THE MEMORIES -->
    <div id="main-content">
        
        <div class="section">
            <h2>Little You 🌸</h2>
            <p>Look how cute you were!</p>
            <div class="photo-grid">
                <!-- Add your childhood photo filenames here -->
                <img src="images/child1.jpg" alt="Childhood Photo 1">
                <img src="images/child2.jpg" alt="Childhood Photo 2">
                <img src="images/child3.jpg" alt="Childhood Photo 3">
            </div>
        </div>

        <div class="section">
            <h2>Beautiful Now 💖</h2>
            <p>Here is my favorite person now.</p>
            <div class="photo-grid">
                 <!-- Add your current photo filenames here -->
                <img src="images/current1.jpg" alt="Current Photo 1">
                <img src="images/current2.jpg" alt="Current Photo 2">
            </div>
        </div>

        <div class="section">
            <h2>Our Kitchen Memories 🍳</h2>
            <p>A moment from our favorite place.</p>
            <video controls>
                <!-- Add your video filename here -->
                <source src="video/kitchen.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

    </div>

    <footer>
        <p>I love you to the moon and back! 🚀</p>
    </footer>

    <script>
        function openGift() {
            // This hides the hero/gift section and shows the memories
            const hero = document.getElementById('hero');
            const content = document.getElementById('main-content');
            
            hero.style.opacity = '0';
            setTimeout(() => {
                hero.style.display = 'none';
                content.style.display = 'block';
                // Fade in effect
                setTimeout(() => {
                    content.style.opacity = '1';
                    content.style.transition = 'opacity 2s';
                }, 100);
            }, 1000);
        }
    </script>

</body>
</html>
